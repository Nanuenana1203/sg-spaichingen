name: Tägliches Datenbank-Backup

on:
  schedule:
    # Täglich um 03:00 UTC (= 04:00 MEZ / 05:00 MESZ)
    - cron: "0 3 * * *"
  workflow_dispatch:
    # Ermöglicht manuellen Start über GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Supabase CLI installieren
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin supabase
          supabase --version

      - name: Datenbank dumpen
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          STAMP=$(date +%Y%m%d-%H%M%S)
          supabase db dump \
            --project-ref rxprumwtuijmpohuunun \
            -f "sgs-db-$STAMP.sql"
          gzip "sgs-db-$STAMP.sql"
          echo "BACKUP_FILE=sgs-db-$STAMP.sql.gz" >> $GITHUB_ENV

      - name: Backup als Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: sgs-db-backup-${{ github.run_number }}
          path: "*.sql.gz"
          retention-days: 90
