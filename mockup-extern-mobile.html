<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGS App – Öffentliche Buchungsseite Mobile (Mockup)</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#e8f0eb;color:#1e293b;display:flex;justify-content:center;padding:20px}
  :root{--green:#5aa37b;--orange:#dd542a;--green-light:#e8f4ee;--green-lighter:#f2f9f5}

  /* Phone frame */
  .phone{width:375px;min-height:667px;background:#f2f9f5;border-radius:20px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.18);border:2px solid #cbd5e1;display:flex;flex-direction:column}

  /* Header */
  .header{background:var(--green);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .header-left{display:flex;align-items:center;gap:8px}
  .header-icon{width:28px;height:28px;background:rgba(255,255,255,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:11px}
  .header-title{font-size:14px;font-weight:700}
  .header-sub{font-size:9px;opacity:0.8}
  .back-btn{font-size:11px;color:rgba(255,255,255,0.9);background:rgba(255,255,255,0.15);padding:4px 10px;border-radius:5px;border:none;cursor:pointer}

  /* Main */
  .main{flex:1;padding:14px;overflow-y:auto}

  /* Card – full width on mobile */
  .card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;box-shadow:0 1px 6px rgba(0,0,0,0.07);overflow:hidden;margin-bottom:12px}
  .card-header{padding:14px 16px;border-bottom:1px solid #f1f5f9}
  .card-title{font-size:16px;font-weight:700;color:#1e293b}
  .card-body{padding:16px}

  /* Slot items */
  .slot-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--green);margin-bottom:10px}
  .slot-item{border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer}
  .slot-item.selected{border-color:var(--green);background:var(--green-light)}
  .slot-date{font-size:12px;font-weight:600;color:#334155}
  .slot-time{font-size:10px;color:#64748b;margin-top:2px}
  .slot-spots{font-size:10px;color:var(--green);margin-top:1px;font-weight:500}

  /* Form */
  .form-label{font-size:11px;font-weight:600;color:#64748b;margin-bottom:3px;display:block}
  .form-input{width:100%;padding:8px 10px;border-radius:7px;border:1px solid #cbd5e1;font-size:13px;color:#1e293b;margin-bottom:12px;outline:none}
  .form-input:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(90,163,123,0.15)}

  /* Buttons – full width on mobile */
  .btn-primary{display:block;width:100%;padding:11px;border-radius:8px;background:var(--green);color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;margin-bottom:8px;text-align:center}
  .btn-secondary{display:block;width:100%;padding:11px;border-radius:8px;background:#f1f5f9;color:#475569;font-size:14px;font-weight:500;border:none;cursor:pointer;text-align:center}

  /* Footer */
  .footer{text-align:center;font-size:10px;color:#94a3b8;padding:10px 16px;background:#fff;border-top:1px solid #f1f5f9;flex-shrink:0}

  /* Annotation */
  .annotation{position:fixed;top:8px;right:8px;background:var(--orange);color:#fff;padding:4px 10px;border-radius:5px;font-size:10px;font-weight:600;z-index:99}
</style>
</head>
<body>
<div class="annotation">Mobile 375px</div>

<div class="phone">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-icon">SG</div>
      <div>
        <div class="header-title">SG Spaichingen</div>
        <div class="header-sub">Öffentliche Buchung</div>
      </div>
    </div>
    <button class="back-btn">← Zurück</button>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="card">
      <div class="card-header">
        <div class="card-title">Dienstbuchung</div>
      </div>
      <div class="card-body">
        <div class="slot-section-title">Verfügbare Termine</div>

        <div class="slot-item selected">
          <div class="slot-date">Sa, 22. März 2026</div>
          <div class="slot-time">09:00 – 13:00 Uhr</div>
          <div class="slot-spots">2 von 3 Plätzen frei</div>
        </div>

        <div class="slot-item">
          <div class="slot-date">Sa, 29. März 2026</div>
          <div class="slot-time">09:00 – 13:00 Uhr</div>
          <div class="slot-spots">3 von 3 Plätzen frei</div>
        </div>

        <label class="form-label" style="margin-top:4px">Ihr Name</label>
        <input class="form-input" type="text" placeholder="Vor- und Nachname" value="Max Mustermann">

        <label class="form-label">Telefon (optional)</label>
        <input class="form-input" type="tel" placeholder="+49 7424 ...">

        <button class="btn-primary">Jetzt buchen</button>
        <button class="btn-secondary">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">Copyright © 2025–2026 Nanuenana</div>
</div>
</body>
</html>
